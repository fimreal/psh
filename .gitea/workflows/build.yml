name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.22'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux/amd64
          - goos: linux
            goarch: arm64
            platform: linux/arm64
          - goos: darwin
            goarch: amd64
            platform: darwin/amd64
          - goos: darwin
            goarch: arm64
            platform: darwin/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Download dependencies
        run: go mod download

      - name: Run tests (native only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test -v ./...

      - name: Run linter (native only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o psh ./cmd/psh

      - name: Prepare binary
        run: |
          # Package binary
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            tar -czf psh-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz psh
            shasum -a 256 psh-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz > psh-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          else
            tar -czf psh-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz psh
            sha256sum psh-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz > psh-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: psh-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            psh-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            psh-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}

  docker-manifest:
    name: Create Docker Manifest
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"

          # Create manifest for version tag using buildx imagetools
          docker buildx imagetools create -t ${DOCKER_USER}/psh:${VERSION} \
            ${DOCKER_USER}/psh:${VERSION}-amd64 \
            ${DOCKER_USER}/psh:${VERSION}-arm64

          # Create manifest for latest (only if not prerelease)
          if [[ ! "$VERSION" =~ - ]]; then
            docker buildx imagetools create -t ${DOCKER_USER}/psh:latest \
              ${DOCKER_USER}/psh:${VERSION}-amd64 \
              ${DOCKER_USER}/psh:${VERSION}-arm64
          fi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-manifest]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux AMD64
        uses: actions/download-artifact@v3
        with:
          name: psh-linux-amd64
          path: artifacts/psh-linux-amd64

      - name: Download Linux ARM64
        uses: actions/download-artifact@v3
        with:
          name: psh-linux-arm64
          path: artifacts/psh-linux-arm64

      - name: Download macOS AMD64
        uses: actions/download-artifact@v3
        with:
          name: psh-darwin-amd64
          path: artifacts/psh-darwin-amd64

      - name: Download macOS ARM64
        uses: actions/download-artifact@v3
        with:
          name: psh-darwin-arm64
          path: artifacts/psh-darwin-arm64

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/psh-linux-amd64/*.tar.gz release-files/
          cp artifacts/psh-linux-amd64/*.sha256 release-files/
          cp artifacts/psh-linux-arm64/*.tar.gz release-files/
          cp artifacts/psh-linux-arm64/*.sha256 release-files/
          cp artifacts/psh-darwin-amd64/*.tar.gz release-files/
          cp artifacts/psh-darwin-amd64/*.sha256 release-files/
          cp artifacts/psh-darwin-arm64/*.tar.gz release-files/
          cp artifacts/psh-darwin-arm64/*.sha256 release-files/
          ls -lh release-files/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: akkuman/gitea-release-action@v1
        with:
          files: release-files/*
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | AMD64 (x86_64) | `psh-linux-amd64.tar.gz` |
            | Linux | ARM64 (aarch64) | `psh-linux-arm64.tar.gz` |
            | macOS | AMD64 (x86_64) | `psh-darwin-amd64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `psh-darwin-arm64.tar.gz` |

            ### Docker Images

            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:latest
            ```

            ### Verification

            ```bash
            sha256sum -c psh-linux-amd64.sha256
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          NODE_OPTIONS: --experimental-fetch
