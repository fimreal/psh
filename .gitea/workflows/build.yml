name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest-amd64
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            platform: linux
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Setup cross-compilation for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --verbose

      - name: Check formatting
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          rustup component add rustfmt
          cargo fmt -- --check

      - name: Run clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Prepare binary
        run: |
          cd target/${{ matrix.target }}/release
          strip psh || true
          tar -czf psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz psh
          sha256sum psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz > psh-${{ matrix.platform }}-${{ matrix.arch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: psh-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            target/${{ matrix.target }}/release/psh-${{ matrix.platform }}-${{ matrix.arch }}.sha256
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest-amd64
    needs: build-and-test
    if: startsWith(gitea.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/psh
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    runs-on: ubuntu-latest-amd64
    needs: build-and-test
    if: startsWith(gitea.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AMD64 artifact
        uses: actions/download-artifact@v4
        with:
          name: psh-linux-amd64
          path: artifacts/psh-linux-amd64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: psh-linux-arm64
          path: artifacts/psh-linux-arm64

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/psh-linux-amd64/*.tar.gz release-files/
          cp artifacts/psh-linux-amd64/*.sha256 release-files/
          cp artifacts/psh-linux-arm64/*.tar.gz release-files/
          cp artifacts/psh-linux-arm64/*.sha256 release-files/
          ls -lh release-files/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITEA_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | AMD64 (x86_64) | `psh-linux-amd64.tar.gz` |
            | Linux | ARM64 (aarch64) | `psh-linux-arm64.tar.gz` |

            ### Docker Images

            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:latest
            ```

            ### Verification

            ```bash
            sha256sum -c psh-linux-amd64.sha256
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
