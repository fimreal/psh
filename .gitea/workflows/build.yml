name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    container: rust:1.88
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            platform: linux
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux

    steps:
      - name: Install Node.js (required for checkout action)
        run: |
          apt-get update
          apt-get install -y nodejs

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.target }}-
            cargo-registry-

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y pkg-config libssl-dev build-essential cmake perl git

      - name: Setup cross-compilation for AMD64
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          apt-get install -y gcc-x86-64-linux-gnu g++-x86-64-linux-gnu binutils-x86-64-linux-gnu
          ln -sf /usr/bin/x86_64-linux-gnu-gcc /usr/local/bin/gcc
          ln -sf /usr/bin/x86_64-linux-gnu-g++ /usr/local/bin/g++
          ln -sf /usr/bin/x86_64-linux-gnu-ar /usr/local/bin/ar

      - name: Setup cross-compilation for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build for AMD64
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CC: x86_64-linux-gnu-gcc
          CXX: x86_64-linux-gnu-g++
          AR: x86_64-linux-gnu-ar
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: x86_64-linux-gnu-gcc
          AWS_LC_SYS_CC: x86_64-linux-gnu-gcc
          AWS_LC_SYS_CXX: x86_64-linux-gnu-g++

      - name: Build for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          AR: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          AWS_LC_SYS_CC: aarch64-linux-gnu-gcc
          AWS_LC_SYS_CXX: aarch64-linux-gnu-g++

      - name: Run tests (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --verbose

      - name: Install formatting and linting tools
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: rustup component add rustfmt clippy

      - name: Check formatting
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt -- --check

      - name: Run clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install strip tools for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: apt-get install -y binutils-aarch64-linux-gnu

      - name: Prepare binary
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip psh || true
          else
            strip psh || true
          fi
          tar -czf psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz psh
          sha256sum psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz > psh-${{ matrix.platform }}-${{ matrix.arch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: psh-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            target/${{ matrix.target }}/release/psh-${{ matrix.platform }}-${{ matrix.arch }}.sha256
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: psh-linux-${{ matrix.arch }}
          path: artifacts

      - name: Extract binary
        run: |
          cd artifacts
          tar -xzf psh-linux-${{ matrix.arch }}.tar.gz
          mv psh ../psh
          ls -la ..

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}

  docker-manifest:
    name: Create Docker Manifest
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"

          # Create manifest for version tag
          docker manifest create --amend --insecure ${DOCKER_USER}/psh:${VERSION} \
            ${DOCKER_USER}/psh:${VERSION}-amd64 \
            ${DOCKER_USER}/psh:${VERSION}-arm64
          docker manifest push ${DOCKER_USER}/psh:${VERSION}

          # Create manifest for latest (only if not prerelease)
          if [[ ! "$VERSION" =~ - ]]; then
            docker manifest create --amend --insecure ${DOCKER_USER}/psh:latest \
              ${DOCKER_USER}/psh:${VERSION}-amd64 \
              ${DOCKER_USER}/psh:${VERSION}-arm64
            docker manifest push ${DOCKER_USER}/psh:latest
          fi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-manifest]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AMD64 artifact
        uses: actions/download-artifact@v3
        with:
          name: psh-linux-amd64
          path: artifacts/psh-linux-amd64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v3
        with:
          name: psh-linux-arm64
          path: artifacts/psh-linux-arm64

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/psh-linux-amd64/*.tar.gz release-files/
          cp artifacts/psh-linux-amd64/*.sha256 release-files/
          cp artifacts/psh-linux-arm64/*.tar.gz release-files/
          cp artifacts/psh-linux-arm64/*.sha256 release-files/
          ls -lh release-files/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: akkuman/gitea-release-action@v1
        with:
          files: release-files/*
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | AMD64 (x86_64) | `psh-linux-amd64.tar.gz` |
            | Linux | ARM64 (aarch64) | `psh-linux-arm64.tar.gz` |

            ### Docker Images

            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:latest
            ```

            ### Verification

            ```bash
            sha256sum -c psh-linux-amd64.sha256
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          NODE_OPTIONS: --experimental-fetch
