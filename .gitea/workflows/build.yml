name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.22'

jobs:
  build:
    name: Build, Test and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -v ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build all binaries via Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          target: export
          outputs: type=local,dest=./binaries

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cd binaries
          for binary in psh-*; do
            tar -czf ../release-files/${binary}.tar.gz ${binary}
            sha256sum ../release-files/${binary}.tar.gz > ../release-files/${binary}.sha256
          done
          ls -lh ../release-files/

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/psh:latest

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: akkuman/gitea-release-action@v1
        with:
          files: release-files/*
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | AMD64 (x86_64) | `psh-linux-amd64.tar.gz` |
            | Linux | ARM64 (aarch64) | `psh-linux-arm64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `psh-darwin-arm64.tar.gz` |

            ### Docker Images

            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:latest
            ```

            ### Verification

            ```bash
            sha256sum -c psh-linux-amd64.sha256
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          NODE_OPTIONS: --experimental-fetch
