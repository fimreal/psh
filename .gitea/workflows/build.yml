name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: rust:1.82-slim
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            platform: linux

          # Linux ARM64 (cross-compile)
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux

    steps:
      - name: Install Node.js (required for actions)
        run: |
          apt-get update
          apt-get install -y curl
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y pkg-config libssl-dev

      - name: Install cross-compilation tools for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITEA_ENV

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          cd target/${{ matrix.target }}/release
          strip psh || true
          tar -czf psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz psh
          sha256sum psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz > psh-${{ matrix.platform }}-${{ matrix.arch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: psh-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/psh-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            target/${{ matrix.target }}/release/psh-${{ matrix.platform }}-${{ matrix.arch }}.sha256
          retention-days: 7

  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    container:
      image: rust:1.82-slim
    steps:
      - name: Install Node.js (required for actions)
        run: |
          apt-get update
          apt-get install -y curl
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y pkg-config libssl-dev

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(gitea.ref, 'refs/tags/v')
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/psh
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(gitea.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: psh-*

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -name "*.tar.gz" -exec cp {} release-files/ \;
          find artifacts -name "*.sha256" -exec cp {} release-files/ \;
          cd release-files
          ls -lh

      - name: Extract version
        id: version
        run: echo "VERSION=${GITEA_REF#refs/tags/}" >> $GITEA_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### 📦 Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | AMD64 (x86_64) | `psh-linux-amd64.tar.gz` |
            | Linux | ARM64 (aarch64) | `psh-linux-arm64.tar.gz` |

            ### 🐳 Docker Images

            ```bash
            # Pull from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:latest
            ```

            ### 🔐 Verification

            Each `.tar.gz` file has a corresponding `.sha256` checksum file. Verify downloads:

            ```bash
            sha256sum -c psh-linux-amd64.sha256
            ```

            ### 📋 Changelog

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build, test, docker, release]
    if: always() && startsWith(gitea.ref, 'refs/tags/v')
    steps:
      - name: Determine build status
        id: status
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.test.result }}" == "success" ]]; then
            echo "status=success" >> $GITEA_OUTPUT
            echo "emoji=✅" >> $GITEA_OUTPUT
          else
            echo "status=failure" >> $GITEA_OUTPUT
            echo "emoji=❌" >> $GITEA_OUTPUT
          fi

      - name: Send notification
        run: |
          echo "Build Status: ${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.status }}"
          echo "Version: ${GITEA_REF#refs/tags/}"
          # Add webhook notification here (Slack, Discord, Email, etc.)
