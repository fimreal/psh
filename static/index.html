<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psh - WebSSH Proxy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #007acc;
        }

        .tab-bar {
            display: flex;
            gap: 2px;
            flex: 1;
            margin-left: 20px;
        }

        .tab {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-bottom: none;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            max-width: 200px;
            border-radius: 4px 4px 0 0;
        }

        .tab.active {
            background: #1e1e1e;
            border-bottom: 2px solid #007acc;
        }

        .tab:hover:not(.active) {
            background: #3e3e42;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            font-size: 14px;
            color: #888;
        }

        .tab-close:hover {
            background: #c75450;
            color: white;
        }

        .add-tab {
            background: #2d2d30;
            border: 1px solid #3e3e42;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            color: #d4d4d4;
        }

        .add-tab:hover {
            background: #3e3e42;
        }

        .content {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .terminal-container {
            flex: 1;
            padding: 10px;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .terminal-container.active {
            display: block;
        }

        .terminal {
            width: 100%;
            height: 100%;
        }

        #welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #666;
            font-size: 14px;
        }

        #welcome h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #888;
        }

        .connection-dialog, .login-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #252526;
            border: 1px solid #3e3e42;
            padding: 30px;
            min-width: 400px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1001;
        }

        .dialog-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #cccccc;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            font-size: 14px;
            border-radius: 4px;
        }

        .form-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-primary {
            background: #007acc;
            color: white;
        }

        .btn-primary:hover {
            background: #005a9e;
        }

        .btn-secondary {
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
        }

        .btn-secondary:hover {
            background: #4c4c4c;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 1000;
        }

        .overlay.active {
            display: block;
        }

        .status-bar {
            background: #007acc;
            color: white;
            padding: 5px 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .hidden {
            display: none !important;
        }

        .error-msg {
            color: #f14c4c;
            font-size: 13px;
            margin-top: 10px;
        }

        select.form-input {
            cursor: pointer;
        }

        select.form-input option {
            background: #3c3c3c;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">psh</div>
        <div class="tab-bar" id="tabBar">
            <!-- Tabs will be dynamically added here -->
        </div>
        <button class="add-tab" id="addTabBtn" title="New Connection (Ctrl+T)">+</button>
    </div>

    <div class="content" id="content">
        <div class="terminal-container active" id="welcome">
            <div>
                <h2>Welcome to psh</h2>
                <p>Click + or press Ctrl+T to start a new SSH connection</p>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusText">Ready</span>
        <span id="connectionInfo"></span>
    </div>

    <div class="overlay" id="overlay"></div>
    
    <div class="connection-dialog hidden" id="connectionDialog">
        <div class="dialog-title">New SSH Connection</div>
        <div class="form-group">
            <label class="form-label">Host (from ~/.ssh/config)</label>
            <select class="form-input" id="hostSelect">
                <option value="">-- Select host --</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Or enter manually: [user@]hostname[:port]</label>
            <input type="text" class="form-input" id="manualHost" placeholder="user@example.com:22">
        </div>
        <div class="button-group">
            <button class="btn btn-primary" id="connectBtn">Connect</button>
            <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        </div>
    </div>

    <script type="module" src="/static/app.js"></script>
</body>
</html>
