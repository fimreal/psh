name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.22'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -v ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          mkdir -p binaries
          for platform in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            echo "Building for $GOOS/$GOARCH..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" -o "binaries/psh-${GOOS}-${GOARCH}" ./cmd/psh
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: binaries/*

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/psh:latest

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cd binaries
          for binary in psh-*; do
            tar -czf ../release-files/${binary}.tar.gz ${binary}
            sha256sum ../release-files/${binary}.tar.gz > ../release-files/${binary}.sha256
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | AMD64 (x86_64) | `psh-linux-amd64.tar.gz` |
            | Linux | ARM64 (aarch64) | `psh-linux-arm64.tar.gz` |
            | macOS | AMD64 (Intel) | `psh-darwin-amd64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | `psh-darwin-arm64.tar.gz` |

            ### Docker Images

            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:${{ steps.version.outputs.VERSION }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/psh:latest
            ```

            ### Verification

            ```bash
            sha256sum -c psh-linux-amd64.sha256
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
